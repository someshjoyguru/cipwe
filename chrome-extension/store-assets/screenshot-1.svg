<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(30,58,138,0.18)"/>
    </filter>
    <filter id="pillShadow" x="-5%" y="-10%" width="115%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(37,99,235,0.15)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- Subtle decorative circles -->
  <circle cx="60" cy="100" r="120" fill="rgba(37,99,235,0.04)"/>
  <circle cx="580" cy="750" r="160" fill="rgba(37,99,235,0.05)"/>
  <circle cx="1240" cy="200" r="80" fill="rgba(37,99,235,0.04)"/>

  <!-- ═══════ LEFT: Value Proposition ═══════ -->

  <!-- CIPWE label chip -->
  <rect x="100" y="110" width="98" height="28" rx="14" fill="rgba(37,99,235,0.1)"/>
  <text x="149" y="129" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2563EB" letter-spacing="0.5">CIPWE v1.0</text>

  <!-- Headline -->
  <text x="100" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#0F172A">ChatGPT, Perplexity &amp;</text>
  <text x="100" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#0F172A">Google AI pull answers</text>
  <text x="100" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#0F172A">from websites.</text>



  <!-- Sub-headline -->
  <text x="100" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#2563EB">Is yours showing up?</text>

  <!-- Body text -->
  <text x="100" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#64748B">CIPWE scans your page in one click and tells you</text>
  <text x="100" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#64748B">exactly what to fix so AI tools can find, understand,</text>
  <text x="100" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#64748B">and cite your content.</text>

  <!-- ─── Feature pills with SVG icons ─── -->

  <!-- Pill 1: One Click -->
  <rect x="100" y="518" width="152" height="40" rx="20" fill="white" filter="url(#pillShadow)"/>
  <rect x="100" y="518" width="152" height="40" rx="20" fill="rgba(37,99,235,0.06)"/>
  <!-- Lightning bolt icon -->
  <g transform="translate(120, 530)">
    <path d="M10 0L4 9h5L7 18l9-11H11z" fill="#2563EB" transform="scale(0.85)"/>
  </g>
  <text x="192" y="543" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1D4ED8">One Click</text>

  <!-- Pill 2: 100% Private -->
  <rect x="268" y="518" width="162" height="40" rx="20" fill="white" filter="url(#pillShadow)"/>
  <rect x="268" y="518" width="162" height="40" rx="20" fill="rgba(37,99,235,0.06)"/>
  <!-- Lock icon -->
  <g transform="translate(284, 529)">
    <rect x="3" y="7" width="12" height="9" rx="2" stroke="#2563EB" stroke-width="1.5" fill="none"/>
    <path d="M5 7V5a4 4 0 018 0v2" stroke="#2563EB" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="9" cy="12" r="1.2" fill="#2563EB"/>
  </g>
  <text x="363" y="543" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1D4ED8">100% Private</text>

  <!-- Pill 3: Actionable Fixes -->
  <rect x="446" y="518" width="172" height="40" rx="20" fill="white" filter="url(#pillShadow)"/>
  <rect x="446" y="518" width="172" height="40" rx="20" fill="rgba(37,99,235,0.06)"/>
  <!-- Checkmark/list icon -->
  <g transform="translate(462, 529)">
    <rect x="0" y="0" width="14" height="16" rx="2" stroke="#2563EB" stroke-width="1.5" fill="none"/>
    <line x1="3" y1="5" x2="11" y2="5" stroke="#2563EB" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="3" y1="8.5" x2="11" y2="8.5" stroke="#2563EB" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="3" y1="12" x2="8" y2="12" stroke="#2563EB" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <text x="543" y="543" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1D4ED8">Actionable Fixes</text>



  <!-- ═══════ RIGHT: Extension Mockup ═══════ -->
  <g transform="translate(718, 70)" filter="url(#cardShadow)">

    <!-- Card background -->
    <rect width="440" height="658" rx="20" fill="white"/>

    <!-- Header gradient -->
    <rect width="440" height="140" rx="20" fill="url(#header)"/>
    <rect y="20" width="440" height="120" fill="url(#header)"/>

    <!-- Score ring -->
    <circle cx="82" cy="72" r="44" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="7"/>
    <circle cx="82" cy="72" r="44" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="220 57" transform="rotate(-90 82 72)"/>
    <text x="82" y="84" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="white">85</text>

    <!-- Grade badge -->
    <rect x="154" y="40" width="54" height="28" rx="14" fill="rgba(255,255,255,0.18)"/>
    <text x="181" y="59" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" fill="white">A-</text>

    <!-- Score meta -->
    <text x="154" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)">85/100</text>
    <text x="154" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="rgba(255,255,255,0.55)">14 passed · 5 need fixing</text>

    <!-- Section label -->
    <text x="22" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="10.5" font-weight="700" fill="#94A3B8" letter-spacing="1">WHAT AI TOOLS CHECK FOR</text>

    <!-- Category rows -->
    <g transform="translate(22, 182)">
      <!-- Row 1 -->
      <text x="0" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#374151">Structured Data</text>
      <rect x="158" y="5" width="148" height="7" rx="3.5" fill="#EFF6FF"/>
      <rect x="158" y="5" width="137" height="7" rx="3.5" fill="#3B82F6"/>
      <text x="316" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#94A3B8">28/30</text>
      <text x="370" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#22C55E">Great</text>

      <!-- Row 2 -->
      <text x="0" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#374151">Page Structure</text>
      <rect x="158" y="31" width="148" height="7" rx="3.5" fill="#EFF6FF"/>
      <rect x="158" y="31" width="133" height="7" rx="3.5" fill="#3B82F6"/>
      <text x="316" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#94A3B8">18/20</text>
      <text x="370" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#22C55E">Great</text>

      <!-- Row 3 -->
      <text x="0" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#374151">Discoverability</text>
      <rect x="158" y="57" width="148" height="7" rx="3.5" fill="#FEF3C7"/>
      <rect x="158" y="57" width="99" height="7" rx="3.5" fill="#F59E0B"/>
      <text x="316" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#94A3B8">10/15</text>
      <text x="370" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#F59E0B">Fix it</text>

      <!-- Row 4 -->
      <text x="0" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#374151">Crawlability</text>
      <rect x="158" y="83" width="148" height="7" rx="3.5" fill="#EFF6FF"/>
      <rect x="158" y="83" width="119" height="7" rx="3.5" fill="#60A5FA"/>
      <text x="316" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#94A3B8">12/15</text>
      <text x="370" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#60A5FA">Good</text>

      <!-- Row 5 -->
      <text x="0" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#374151">Content Quality</text>
      <rect x="158" y="109" width="148" height="7" rx="3.5" fill="#FEF3C7"/>
      <rect x="158" y="109" width="98" height="7" rx="3.5" fill="#F59E0B"/>
      <text x="316" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#94A3B8">7/10</text>
      <text x="370" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#F59E0B">Fix it</text>

      <!-- Row 6 -->
      <text x="0" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#374151">AI Agent Support</text>
      <rect x="158" y="135" width="148" height="7" rx="3.5" fill="#EFF6FF"/>
      <rect x="158" y="135" width="133" height="7" rx="3.5" fill="#3B82F6"/>
      <text x="316" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#94A3B8">9/10</text>
      <text x="370" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#22C55E">Great</text>
    </g>

    <!-- Divider -->
    <line x1="0" y1="348" x2="440" y2="348" stroke="#F1F5F9" stroke-width="1"/>

    <!-- Tabs -->
    <text x="86" y="373" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2563EB">Things to Fix (5)</text>
    <rect x="26" y="378" width="120" height="2.5" rx="1.5" fill="#2563EB"/>
    <text x="225" y="373" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#CBD5E1">Looking Good (14)</text>
    <text x="362" y="373" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#CBD5E1">All Checks</text>

    <!-- Divider under tabs -->
    <line x1="0" y1="385" x2="440" y2="385" stroke="#F1F5F9" stroke-width="1"/>

    <!-- Issue cards -->
    <g transform="translate(16, 396)">

      <!-- Issue 1 -->
      <rect width="408" height="64" rx="10" fill="#FAFAFA" stroke="#F1F5F9" stroke-width="1"/>
      <rect x="0" y="0" width="3" height="64" rx="1.5" fill="#EF4444"/>
      <circle cx="28" cy="32" r="11" fill="#FEF2F2"/>
      <text x="28" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" fill="#EF4444">!</text>
      <text x="50" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700" fill="#1F2937">Add FAQ Schema</text>
      <text x="50" y="41" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">AI tools can't extract Q&amp;A from your page.</text>
      <text x="50" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Add FAQPage schema so they can.</text>

      <!-- Issue 2 -->
      <rect y="72" width="408" height="64" rx="10" fill="#FAFAFA" stroke="#F1F5F9" stroke-width="1"/>
      <rect x="0" y="72" width="3" height="64" rx="1.5" fill="#F59E0B"/>
      <circle cx="28" cy="104" r="11" fill="#FFFBEB"/>
      <text x="28" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" fill="#F59E0B">!</text>
      <text x="50" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700" fill="#1F2937">Missing Social Preview Image</text>
      <text x="50" y="113" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">No og:image found. AI previews &amp; social shares</text>
      <text x="50" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">won't have a thumbnail.</text>

      <!-- Issue 3 -->
      <rect y="144" width="408" height="64" rx="10" fill="#FAFAFA" stroke="#F1F5F9" stroke-width="1"/>
      <rect x="0" y="144" width="3" height="64" rx="1.5" fill="#EF4444"/>
      <circle cx="28" cy="176" r="11" fill="#FEF2F2"/>
      <text x="28" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" fill="#EF4444">!</text>
      <text x="50" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="12.5" font-weight="700" fill="#1F2937">No Canonical URL</text>
      <text x="50" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">AI may index duplicate versions of this page.</text>
      <text x="50" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Add a canonical link to fix.</text>
    </g>

  </g>
</svg>
