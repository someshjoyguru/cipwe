<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="640" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#0F172A">Works on Any Website — Even SPAs</text>
  <text x="640" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="19" fill="#64748B">Automatically detects your framework and waits for content to load before scanning</text>

  <!-- ═══════ Framework Grid — Row 1 ═══════ -->

  <!-- React -->
  <g transform="translate(120, 145)">
    <rect width="240" height="105" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <g transform="translate(22, 28)">
      <rect width="44" height="44" rx="10" fill="#EFF6FF"/>
      <circle cx="22" cy="22" r="3" fill="#61DAFB"/>
      <ellipse cx="22" cy="22" rx="10" ry="4" stroke="#61DAFB" stroke-width="1.3" fill="none"/>
      <ellipse cx="22" cy="22" rx="10" ry="4" stroke="#61DAFB" stroke-width="1.3" fill="none" transform="rotate(60,22,22)"/>
      <ellipse cx="22" cy="22" rx="10" ry="4" stroke="#61DAFB" stroke-width="1.3" fill="none" transform="rotate(-60,22,22)"/>
    </g>
    <text x="76" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0F172A">React</text>
    <text x="76" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">SPA hydration detected</text>
    <text x="76" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">Waits for render</text>
  </g>

  <!-- Next.js -->
  <g transform="translate(390, 145)">
    <rect width="240" height="105" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <g transform="translate(22, 28)">
      <rect width="44" height="44" rx="10" fill="#0F172A"/>
      <text x="22" y="29" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="white">N</text>
    </g>
    <text x="76" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0F172A">Next.js</text>
    <text x="76" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">SSR &amp; SSG support</text>
    <text x="76" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">__NEXT_DATA__ detected</text>
  </g>

  <!-- Vue -->
  <g transform="translate(660, 145)">
    <rect width="240" height="105" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <g transform="translate(22, 28)">
      <rect width="44" height="44" rx="10" fill="#EFF6FF"/>
      <polygon points="22,10 32,28 27,28 22,18 17,28 12,28" fill="#42B883"/>
      <polygon points="22,14 27,22 24,22 22,18 20,22 17,22" fill="#35495E"/>
    </g>
    <text x="76" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0F172A">Vue</text>
    <text x="76" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">Vue app detection</text>
    <text x="76" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">__vue_app__ support</text>
  </g>

  <!-- Angular -->
  <g transform="translate(930, 145)">
    <rect width="240" height="105" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <g transform="translate(22, 28)">
      <rect width="44" height="44" rx="10" fill="#FFF1F2"/>
      <polygon points="22,9 34,14 32,30 22,35 12,30 10,14" fill="none" stroke="#DD0031" stroke-width="1.5"/>
      <text x="22" y="27" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#DD0031">A</text>
    </g>
    <text x="76" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0F172A">Angular</text>
    <text x="76" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">ng-version detected</text>
    <text x="76" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">Zone.js aware</text>
  </g>

  <!-- ═══════ Framework Grid — Row 2 ═══════ -->

  <!-- Nuxt -->
  <g transform="translate(200, 275)">
    <rect width="240" height="105" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <g transform="translate(22, 28)">
      <rect width="44" height="44" rx="10" fill="#EFF6FF"/>
      <polygon points="14,30 22,14 30,30" fill="none" stroke="#00DC82" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
    <text x="76" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0F172A">Nuxt</text>
    <text x="76" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">Universal rendering</text>
    <text x="76" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">__NUXT__ detection</text>
  </g>

  <!-- SvelteKit -->
  <g transform="translate(470, 275)">
    <rect width="240" height="105" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <g transform="translate(22, 28)">
      <rect width="44" height="44" rx="10" fill="#FFF7ED"/>
      <path d="M28 12c-4-3-10-2-12 2s0 9 4 11l-2 0c-4-3-6-8-4-12s8-6 12-3z" fill="#FF3E00"/>
      <path d="M16 32c4 3 10 2 12-2s0-9-4-11l2 0c4 3 6 8 4 12s-8 6-12 3z" fill="#FF8A00"/>
    </g>
    <text x="76" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0F172A">SvelteKit</text>
    <text x="76" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">Svelte component</text>
    <text x="76" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">detection built-in</text>
  </g>

  <!-- Gatsby & Astro -->
  <g transform="translate(740, 275)">
    <rect width="240" height="105" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <g transform="translate(22, 28)">
      <rect width="44" height="44" rx="10" fill="#F5F3FF"/>
      <circle cx="22" cy="22" r="10" fill="none" stroke="#663399" stroke-width="2"/>
      <circle cx="22" cy="22" r="3" fill="#663399"/>
      <line x1="22" y1="12" x2="22" y2="19" stroke="#663399" stroke-width="1.5"/>
      <line x1="22" y1="25" x2="22" y2="32" stroke="#663399" stroke-width="1.5"/>
    </g>
    <text x="76" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0F172A">Gatsby &amp; Astro</text>
    <text x="76" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">Static site support</text>
    <text x="76" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6B7280">Plus any HTML site</text>
  </g>

  <!-- ═══════ Bottom: 3 Steps ═══════ -->
  <g transform="translate(0, 420)">
    <rect width="1280" height="380" fill="url(#heroGrad)"/>

    <text x="640" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="700" fill="white">3 Steps. 10 Seconds. Done.</text>

    <!-- Step 1 -->
    <g transform="translate(100, 90)">
      <circle cx="50" cy="50" r="50" fill="rgba(255,255,255,0.1)"/>
      <circle cx="50" cy="50" r="36" fill="rgba(255,255,255,0.06)"/>
      <text x="50" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="white">1</text>
      <text x="120" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white">Visit any website</text>
      <text x="120" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">Your site, competitor's site, any page</text>
      <text x="120" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">you want to check</text>
    </g>


    <!-- Step 2 -->
    <g transform="translate(490, 90)">
      <circle cx="50" cy="50" r="50" fill="rgba(255,255,255,0.1)"/>
      <circle cx="50" cy="50" r="36" fill="rgba(255,255,255,0.06)"/>
      <text x="50" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="white">2</text>
      <text x="120" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white">Click the icon</text>
      <text x="120" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">One click runs all 19 checks</text>
      <text x="120" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">automatically</text>
    </g>


    <!-- Step 3 -->
    <g transform="translate(885, 90)">
      <circle cx="50" cy="50" r="50" fill="rgba(255,255,255,0.1)"/>
      <circle cx="50" cy="50" r="36" fill="rgba(255,255,255,0.06)"/>
      <text x="50" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="white">3</text>
      <text x="120" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white">See what to fix</text>
      <text x="120" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">Get a score, grade, and plain-English</text>
      <text x="120" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">recommendations</text>
    </g>

    <!-- Bottom tagline -->
    <text x="640" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">100% local · Nothing leaves your browser · Free &amp; open source</text>
    <text x="640" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.35)">github.com/someshjoyguru/cipwe</text>
  </g>
</svg>
