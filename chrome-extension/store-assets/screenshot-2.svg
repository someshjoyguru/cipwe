<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="640" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#0F172A">19 Checks AI Tools Actually Look For</text>
  <text x="640" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="19" fill="#64748B">Each check tells you what's missing and exactly how to fix it</text>

  <!-- ═══════ Row 1 ═══════ -->

  <!-- Card 1: Structured Data -->
  <g transform="translate(80, 145)">
    <rect width="360" height="280" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect width="360" height="8" rx="4" fill="#2563EB" y="0"/>

    <!-- Icon: bar chart -->
    <g transform="translate(24, 30)">
      <rect width="36" height="36" rx="8" fill="#EFF6FF"/>
      <rect x="9" y="20" width="5" height="10" rx="1" fill="#2563EB"/>
      <rect x="16" y="12" width="5" height="18" rx="1" fill="#2563EB"/>
      <rect x="23" y="16" width="5" height="14" rx="1" fill="#2563EB"/>
    </g>
    <text x="70" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#0F172A">Can AI read your data?</text>
    <rect x="274" y="35" width="66" height="26" rx="13" fill="#DBEAFE"/>
    <text x="307" y="53" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1D4ED8">30 pts</text>

    <text x="24" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  JSON-LD markup detected</text>
    <text x="24" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  Valid schema types used</text>
    <text x="24" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  Article / Product schema</text>
    <text x="24" y="154" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  FAQ schema for Q&amp;A content</text>
    <text x="24" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  Question-answer structure</text>

    <line x1="24" y1="196" x2="336" y2="196" stroke="#E5E7EB" stroke-width="1"/>
    <text x="24" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#475569">Why it matters:</text>
    <text x="24" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B7280">Without structured data, AI tools can't</text>
    <text x="24" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B7280">extract facts from your page to cite you.</text>
  </g>

  <!-- Card 2: Semantic HTML -->
  <g transform="translate(460, 145)">
    <rect width="360" height="280" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect width="360" height="8" rx="4" fill="#3B82F6" y="0"/>

    <!-- Icon: code brackets -->
    <g transform="translate(24, 30)">
      <rect width="36" height="36" rx="8" fill="#EFF6FF"/>
      <path d="M14 12l-5 6 5 6" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M23 12l5 6-5 6" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <text x="70" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#0F172A">Is your page structured?</text>
    <rect x="274" y="35" width="66" height="26" rx="13" fill="#DBEAFE"/>
    <text x="307" y="53" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1D4ED8">20 pts</text>

    <text x="24" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  Single clear page title (H1)</text>
    <text x="24" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  Logical heading hierarchy</text>
    <text x="24" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  Lists &amp; tables for data</text>
    <text x="24" y="154" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  Clear main content area</text>
    <text x="24" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  Article / section elements</text>

    <line x1="24" y1="196" x2="336" y2="196" stroke="#E5E7EB" stroke-width="1"/>
    <text x="24" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#475569">Why it matters:</text>
    <text x="24" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B7280">AI understands well-organized pages better</text>
    <text x="24" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B7280">and extracts more accurate answers.</text>
  </g>

  <!-- Card 3: Metadata -->
  <g transform="translate(840, 145)">
    <rect width="360" height="280" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect width="360" height="8" rx="4" fill="#60A5FA" y="0"/>

    <!-- Icon: tag -->
    <g transform="translate(24, 30)">
      <rect width="36" height="36" rx="8" fill="#EFF6FF"/>
      <path d="M10 10h9l8 8-9 9-8-8z" stroke="#60A5FA" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
      <circle cx="15" cy="15" r="1.5" fill="#60A5FA"/>
    </g>
    <text x="70" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#0F172A">Can AI discover you?</text>
    <rect x="274" y="35" width="66" height="26" rx="13" fill="#DBEAFE"/>
    <text x="307" y="53" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1D4ED8">15 pts</text>

    <text x="24" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  Page has a title tag</text>
    <text x="24" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  Meta description present</text>
    <text x="24" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  Canonical URL set</text>
    <text x="24" y="154" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  OpenGraph / social tags</text>

    <line x1="24" y1="180" x2="336" y2="180" stroke="#E5E7EB" stroke-width="1"/>
    <text x="24" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#475569">Why it matters:</text>
    <text x="24" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B7280">Missing metadata means AI can't summarize</text>
    <text x="24" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B7280">or preview your page correctly.</text>
  </g>

  <!-- ═══════ Row 2 ═══════ -->

  <!-- Card 4: Crawl Signals -->
  <g transform="translate(80, 455)">
    <rect width="360" height="260" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect width="360" height="8" rx="4" fill="#93C5FD" y="0"/>

    <!-- Icon: globe/search -->
    <g transform="translate(24, 28)">
      <rect width="36" height="36" rx="8" fill="#EFF6FF"/>
      <circle cx="16" cy="16" r="7" stroke="#93C5FD" stroke-width="1.8" fill="none"/>
      <path d="M12 10c0 0 1 6 4 6s4-6 4-6" stroke="#93C5FD" stroke-width="1.3" fill="none"/>
      <line x1="9" y1="16" x2="23" y2="16" stroke="#93C5FD" stroke-width="1.3"/>
      <line x1="22" y1="22" x2="27" y2="27" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="70" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#0F172A">Can AI crawlers find you?</text>
    <rect x="274" y="33" width="66" height="26" rx="13" fill="#DBEAFE"/>
    <text x="307" y="51" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1D4ED8">15 pts</text>

    <text x="24" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  robots.txt exists</text>
    <text x="24" y="106" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  Sitemap available</text>

    <line x1="24" y1="130" x2="336" y2="130" stroke="#E5E7EB" stroke-width="1"/>
    <text x="24" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#475569">Why it matters:</text>
    <text x="24" y="177" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B7280">AI crawlers need directions to find all your</text>
    <text x="24" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B7280">pages. No sitemap = invisible pages.</text>
  </g>

  <!-- Card 5: Content Clarity -->
  <g transform="translate(460, 455)">
    <rect width="360" height="260" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect width="360" height="8" rx="4" fill="#BFDBFE" y="0"/>

    <!-- Icon: document/text lines -->
    <g transform="translate(24, 28)">
      <rect width="36" height="36" rx="8" fill="#EFF6FF"/>
      <rect x="10" y="10" width="16" height="16" rx="2" stroke="#60A5FA" stroke-width="1.5" fill="none"/>
      <line x1="14" y1="15" x2="22" y2="15" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="14" y1="19" x2="20" y2="19" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="14" y1="23" x2="22" y2="23" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="70" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#0F172A">Is your content AI-friendly?</text>
    <rect x="274" y="33" width="66" height="26" rx="13" fill="#DBEAFE"/>
    <text x="307" y="51" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1D4ED8">10 pts</text>

    <text x="24" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  Enough content to summarize</text>
    <text x="24" y="106" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  Structured summary section</text>

    <line x1="24" y1="130" x2="336" y2="130" stroke="#E5E7EB" stroke-width="1"/>
    <text x="24" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#475569">Why it matters:</text>
    <text x="24" y="177" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B7280">Thin or poorly structured content gets</text>
    <text x="24" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B7280">skipped by AI in favor of competitors.</text>
  </g>

  <!-- Card 6: Agent Signals -->
  <g transform="translate(840, 455)">
    <rect width="360" height="260" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect width="360" height="8" rx="4" fill="#1E40AF" y="0"/>

    <!-- Icon: robot/gear -->
    <g transform="translate(24, 28)">
      <rect width="36" height="36" rx="8" fill="#EFF6FF"/>
      <circle cx="18" cy="18" r="6" stroke="#1E40AF" stroke-width="1.5" fill="none"/>
      <circle cx="18" cy="18" r="2" fill="#1E40AF"/>
      <line x1="18" y1="9" x2="18" y2="12" stroke="#1E40AF" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="18" y1="24" x2="18" y2="27" stroke="#1E40AF" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="9" y1="18" x2="12" y2="18" stroke="#1E40AF" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="24" y1="18" x2="27" y2="18" stroke="#1E40AF" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="70" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#0F172A">Ready for AI agents?</text>
    <rect x="274" y="33" width="66" height="26" rx="13" fill="#DBEAFE"/>
    <text x="307" y="51" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1D4ED8">10 pts</text>

    <text x="24" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#374151">✓  llms.txt file for AI agents</text>

    <line x1="24" y1="108" x2="336" y2="108" stroke="#E5E7EB" stroke-width="1"/>
    <text x="24" y="133" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#475569">Why it matters:</text>
    <text x="24" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B7280">AI agents (like ChatGPT plugins) look for</text>
    <text x="24" y="173" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6B7280">llms.txt to understand what your site offers.</text>
  </g>
</svg>
